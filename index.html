<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salesforce Certification Flash Cards</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="container">
    <header>
      <h1>Salesforce Platform Developer I</h1>
    </header>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label">
      <span id="progressText">Question 1 of 8</span>
      <span id="revealedCount">0 revealed</span>
    </div>

    <div class="card-wrapper">
      <div class="card" id="flashCard" tabindex="0" role="button" aria-label="Flash card. Click to reveal answer.">
        <div class="card-front">
          <span class="question-badge" id="questionBadge">Q1</span>
          <p class="question-text" id="questionText"></p>
          <ul class="options" id="optionsList"></ul>
          <div class="reveal-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/>
            </svg>
            Click to reveal answer
          </div>
        </div>
        <div class="card-back">
          <div class="answer-header">
            <span class="answer-label">Correct Answer</span>
            <span class="answer-value" id="answerValue"></span>
          </div>
          <p class="explanation" id="explanation"></p>
        </div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-btn" id="prevBtn" disabled aria-label="Previous question">
        ← Prev
      </button>
      <div class="nav-dots" id="navDots"></div>
      <button class="nav-btn primary" id="nextBtn" aria-label="Next question">
        Next →
      </button>
    </nav>

    <p class="keyboard-hint">
      <kbd>Space</kbd> reveal &nbsp;·&nbsp; <kbd>←</kbd> <kbd>→</kbd> navigate
    </p>
  </div>

  <script src="js/cards.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
